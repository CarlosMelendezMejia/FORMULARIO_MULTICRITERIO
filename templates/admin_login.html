<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
          --color-primario-oscuro: #275E62;
          --color-primario-medio: #1F3637;
          --color-acento: #20858C;
          --color-claro-1: #BAFAFF;
          --color-claro-2: #90F8FF;
        }
        
        body {
            background: linear-gradient(135deg, var(--color-claro-1), var(--color-claro-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-admin-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-top: 4px solid var(--color-acento);
        }
        
        h2 {
            color: var(--color-primario-medio);
            font-weight: 600;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
            margin-bottom: 1.5rem;
        }
        
        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: var(--color-acento);
        }
        
        .form-label {
            color: var(--color-primario-medio);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border: 2px solid #dee2e6;
            padding: 10px 15px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--color-acento);
            box-shadow: 0 0 0 0.25rem rgba(32, 133, 140, 0.25);
        }
        
        .btn-primary {
            background-color: var(--color-acento);
            border: none;
            padding: 10px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background-color: var(--color-primario-oscuro);
            transform: translateY(-2px);
        }
        
        .alert-danger {
            background-color: rgba(220, 53, 69, 0.1);
            border-left: 4px solid #dc3545;
            color: #dc3545;
            border-radius: 0 8px 8px 0;
            padding: 1rem;
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--color-primario-medio);
        }
        
        .logo-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .logo-placeholder {
            width: 60px;
            height: 50px;
            background-color: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 12px;
            border: 1px dashed #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="login-admin-card mx-auto">
            <!-- Logos -->
            <div class="logo-container">
                <div class="logo-placeholder">Logo 1</div>
                <div class="logo-placeholder">Logo 2</div>
                <div class="logo-placeholder">Logo 3</div>
            </div>
            
            <h2>Acceso Administrador</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger mb-4">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}
            
            <form method="post">
                <div class="mb-4 password-container">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                    <i class="bi bi-eye-fill toggle-password" id="togglePassword"></i>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>
        </div>
    </div>

    <script>
        // Mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye-fill');
            this.classList.toggle('bi-eye-slash-fill');
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
