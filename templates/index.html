<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio | Sistema de Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    <div class="container py-5">
        <div class="login-card mx-auto">
            <div class="card-header">
                <h3 class="mb-0">Sistema de Evaluación</h3>
                <!-- Icono de información -->
                <i class="bi bi-info-circle info-icon" data-bs-toggle="modal" data-bs-target="#instruccionesModal"></i>
            </div>
            
            <div class="card-body">
                <!-- Espacio para los 3 logos -->
                <div class="logo-container">
                    <div class="logo-img-container">
                        <img src="static/img/logo_unam.png" alt="Logo UNAM">
                    </div>
                    <div class="logo-img-container">
                        <img src="static/img/logo_fes.png" alt="Logo FES">
                    </div>
                    <div class="logo-img-container">
                        <img src="static/img/logo3.png" alt="Logo 3">
                    </div>
                </div>
                
                <form action="/formulario_redirect" method="post">
                    <div class="mb-3">
                        <label for="usuario_id" class="form-label">ID de Usuario</label>
                        <input type="number" class="form-control" name="usuario_id" id="usuario_id" required>
                        <div class="form-text">Ingresa tu ID de usuario para acceder al formulario asignado.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Ingresar al Formulario</button>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <a href="{{ url_for('admin_login') }}" class="btn btn-outline-dark w-100">Ingresar como Administrador</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Instrucciones -->
    <div class="modal fade" id="instruccionesModal" tabindex="-1" aria-labelledby="instruccionesModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="instruccionesModalLabel">Instrucciones del Sistema</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Espacio reservado para las instrucciones -->
                    <!-- Las instrucciones se incluirán posteriormente aquí -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
