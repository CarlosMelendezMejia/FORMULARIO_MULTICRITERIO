<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio | Sistema de Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
          --color-primario-oscuro: #275E62;
          --color-primario-medio: #1F3637;
          --color-acento: #20858C;
          --color-claro-1: #BAFAFF;
          --color-claro-2: #90F8FF;
        }
        
        body {
            background: linear-gradient(135deg, var(--color-claro-1), var(--color-claro-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .login-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .card-header {
            background-color: var(--color-primario-medio);
            color: white;
            text-align: center;
            padding: 1.5rem;
            border-bottom: 4px solid var(--color-acento);
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .btn-primary {
            background-color: var(--color-acento);
            border: none;
            padding: 10px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background-color: var(--color-primario-oscuro);
            transform: translateY(-2px);
        }
        
        .btn-outline-dark {
            border-color: var(--color-primario-medio);
            color: var(--color-primario-medio);
            transition: all 0.3s;
        }
        
        .btn-outline-dark:hover {
            background-color: var(--color-primario-medio);
            color: white;
        }
        
        .logo-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
        }
        
        .logo-placeholder {
            width: 80px;
            height: 80px;
            background-color: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 12px;
            border: 1px dashed #dee2e6;
        }
        
        .form-control:focus {
            border-color: var(--color-acento);
            box-shadow: 0 0 0 0.25rem rgba(32, 133, 140, 0.25);
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="login-card mx-auto">
            <div class="card-header">
                <h3 class="mb-0">Sistema de Evaluación</h3>
            </div>
            
            <div class="card-body">
                <!-- Espacio para los 3 logos -->
                <div class="logo-container">
                    <div class="logo-placeholder">Logo 1</div>
                    <div class="logo-placeholder">Logo 2</div>
                    <div class="logo-placeholder">Logo 3</div>
                </div>
                
                <form action="/formulario_redirect" method="post">
                    <div class="mb-3">
                        <label for="usuario_id" class="form-label">ID de Usuario</label>
                        <input type="number" class="form-control" name="usuario_id" id="usuario_id" required>
                        <div class="form-text">Ingresa tu ID de usuario para acceder al formulario asignado.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Ingresar al Formulario</button>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <a href="{{ url_for('panel_admin') }}" class="btn btn-outline-dark w-100">Ingresar como Administrador</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
