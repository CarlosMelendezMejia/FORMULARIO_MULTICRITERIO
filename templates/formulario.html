<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const selects = document.querySelectorAll('select.valor-factor');

            function actualizarOpciones() {
                const usados = new Set();
                selects.forEach(select => {
                    if (select.value) {
                        usados.add(select.value);
                    }
                });

                selects.forEach(select => {
                    const valorActual = select.value;
                    [...select.options].forEach(option => {
                        if (option.value === "" || option.value === valorActual) {
                            option.disabled = false;
                        } else {
                            option.disabled = usados.has(option.value);
                        }
                    });
                });
            }

            selects.forEach(select => {
                select.addEventListener('change', actualizarOpciones);
            });

            actualizarOpciones();
        });
    </script>
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4 text-center">Formulario de Evaluación</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('guardar_respuesta') }}" class="card p-4 shadow">
        <input type="hidden" name="usuario_id" value="{{ usuario_id }}">
        <input type="hidden" name="formulario_id" value="{{ formulario.id_formulario }}">

        <p><strong>Formulario asignado:</strong> {{ formulario.nombre_formulario }}</p>

        {% for i, factor in enumerate(factores, start=1) %}
            <div class="mb-3">
                <label class="form-label">
                    <strong>{{ factor.nombre }}</strong><br>
                    <small class="text-muted">{{ factor.descripcion }}</small>
                </label>
                <input type="hidden" name="factor_id_{{ i }}" value="{{ factor.id }}">
                <select name="valor_{{ i }}" class="form-select valor-factor" required>
                    <option value="">Seleccione un valor del 1 al 10</option>
                    {% for num in range(1, 11) %}
                        <option value="{{ num }}">{{ num }}</option>
                    {% endfor %}
                </select>
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary w-100 mt-3">Guardar Respuestas</button>
    </form>
</div>

</body>
</html>
