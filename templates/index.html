<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio | Sistema de Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h3 class="text-center mb-4">Sistema de Evaluación</h3>

            <form action="/formulario_redirect" method="post">
                <div class="mb-3">
                    <label for="usuario_id" class="form-label">ID de Usuario</label>
                    <input type="number" class="form-control" name="usuario_id" id="usuario_id" required>
                    <div class="form-text">Ingresa tu ID de usuario para acceder al formulario asignado.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Ingresar al Formulario</button>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <a href="{{ url_for('panel_admin') }}" class="btn btn-outline-dark w-100">Ingresar como
                    Administrador</a>
            </div>
        </div>
    </div>

</body>

</html>
