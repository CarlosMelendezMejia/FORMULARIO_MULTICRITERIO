<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ranking de Factores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
</head>

<body class="bg-light">
    <div id="rankingContent" class="container py-5">
        <h3 class="text-center mb-4">Ranking Global de Factores</h3>

        <div class="table-responsive">
            <table class="table table-bordered table-hover bg-white shadow-sm text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Puesto</th>
                        <th>Factor</th>
                        <th>Total Ponderado</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in ranking %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ r.nombre }}</td>
                        <td>{{ '%.2f' | format(r.total or 0) }}</td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>
        </div>

        <canvas id="rankingChart" class="mt-4"></canvas>

        <div class="text-center mt-4">
            <button id="downloadPDF" class="btn btn-primary me-2">Descargar PDF</button>
            <a href="{{ url_for('panel_admin') }}" class="btn btn-secondary">Volver al Panel</a>
        </div>
    </div>

    <script>
        const factorLabels = {{ ranking|map(attribute='nombre')|list|tojson | safe }};
        const factorTotals = {{ ranking|map(attribute='total')|list|tojson | safe }};

        const ctx = document.getElementById('rankingChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: factorLabels,
                datasets: [{
                    label: 'Total Ponderado',
                    data: factorTotals,
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        document.getElementById('downloadPDF').addEventListener('click', () => {
            const element = document.getElementById('rankingContent');
            html2pdf().from(element).save('ranking.pdf');
        });
    </script>
</body>

</html>
