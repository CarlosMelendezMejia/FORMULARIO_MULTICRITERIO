<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    <div class="container py-5">
        <div class="login-admin-card mx-auto">
            <!-- Logos -->
            <div class="logo-container">
                <div class="logo-placeholder">Logo 1</div>
                <div class="logo-placeholder">Logo 2</div>
                <div class="logo-placeholder">Logo 3</div>
            </div>

            <h2>Acceso Administrador</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="alert alert-danger mb-4">{{ messages[0] }}</div>
            {% endif %}
            {% endwith %}

            <form method="post">
                <div class="mb-4 password-container">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye-fill');
            this.classList.toggle('bi-eye-slash-fill');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
