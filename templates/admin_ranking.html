<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Factores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h3 class="mb-4 text-center">Ranking de Factores (por ponderación)</h3>
    <table class="table table-striped table-bordered bg-white text-center">
        <thead class="table-dark">
            <tr>
                <th>Puesto</th>
                <th>Factor</th>
                <th>Suma Ponderada</th>
            </tr>
        </thead>
        <tbody>
            {% for i, f in enumerate(ranking, start=1) %}
            <tr>
                <td>{{ i }}</td>
                <td>{{ f.nombre }}</td>
                <td>{{ '%.2f'|format(f.total) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="text-center">
        <a href="{{ url_for('panel_admin') }}" class="btn btn-secondary mt-3">Volver al panel</a>
    </div>
</div>
</body>
</html>
