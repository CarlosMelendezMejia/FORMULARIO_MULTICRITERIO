<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmación de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
          --color-primario-oscuro: #275E62;
          --color-primario-medio: #1F3637;
          --color-acento: #20858C;
          --color-claro-1: #BAFAFF;
          --color-claro-2: #90F8FF;
        }
        
        body {
            background: linear-gradient(135deg, var(--color-claro-1), var(--color-claro-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .confirmation-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            border-top: 4px solid var(--color-acento);
        }
        
        .check-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(32, 133, 140, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--color-acento);
            font-size: 2.5rem;
        }
        
        h3 {
            color: var(--color-primario-medio);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        
        p {
            color: #555;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn-primary {
            background-color: var(--color-acento);
            border: none;
            padding: 10px 25px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background-color: var(--color-primario-oscuro);
            transform: translateY(-2px);
        }
        
        .logo-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .logo-placeholder {
            width: 80px;
            height: 60px;
            background-color: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 12px;
            border: 1px dashed #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="confirmation-card">
            <!-- Logos -->
            <div class="logo-container">
                <div class="logo-placeholder">Logo 1</div>
                <div class="logo-placeholder">Logo 2</div>
                <div class="logo-placeholder">Logo 3</div>
            </div>
            
            <!-- Icono de confirmación -->
            <div class="check-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            
            <h3>¡Formulario enviado exitosamente!</h3>
            <p>Gracias por tu participación. Tus respuestas han sido registradas correctamente.</p>
            
            <a href="{{ url_for('index') }}" class="btn btn-primary">Volver a la página principal</a>
        </div>
    </div>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
